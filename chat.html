<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizon AI Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at 20% 30%, #0b0e1a, #03050c);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
    }
    .chat-container {
      max-width: 900px;
      width: 100%;
      height: 90vh;
      max-height: 750px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2.5rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }
    .chat-header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h2 {
      font-size: 1.3rem;
      font-weight: 500;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header h2 span {
      background: #7a8cff;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
    .chat-header small {
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
    }
    .messages {
      flex: 1;
      padding: 1.8rem 2rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      background: rgba(0,0,0,0.2);
    }
    .message {
      max-width: 80%;
      padding: 0.9rem 1.4rem;
      border-radius: 1.8rem;
      font-size: 0.95rem;
      line-height: 1.6;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .user {
      align-self: flex-end;
      background: linear-gradient(135deg, #7a8cff, #5a6ee0);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .ai {
      align-self: flex-start;
      background: rgba(255,255,255,0.07);
      color: #e5e7f0;
      border-bottom-left-radius: 4px;
      border: 1px solid rgba(255,255,255,0.03);
    }
    .ai .label {
      font-size: 0.65rem;
      opacity: 0.4;
      margin-bottom: 4px;
      display: block;
    }
    .typing-indicator {
      align-self: flex-start;
      background: rgba(255,255,255,0.05);
      padding: 0.8rem 1.6rem;
      border-radius: 2rem;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #7a8cff;
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
    .input-area {
      padding: 1.2rem 2rem;
      border-top: 1px solid rgba(255,255,255,0.04);
      display: flex;
      gap: 0.8rem;
      background: rgba(0,0,0,0.2);
    }
    .input-area input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 40px;
      padding: 0.9rem 1.6rem;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
    }
    .input-area input:focus { border-color: #7a8cff; background: rgba(255,255,255,0.08); }
    .input-area input::placeholder { color: rgba(255,255,255,0.25); }
    .input-area button {
      background: linear-gradient(135deg, #7a8cff, #5a6ee0);
      border: none;
      border-radius: 40px;
      padding: 0 2rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.95rem;
    }
    .input-area button:hover { transform: scale(1.03); box-shadow: 0 8px 30px rgba(90,110,224,0.3); }
    .input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
    @media (max-width: 600px) {
      .chat-container { border-radius: 1.5rem; height: 95vh; }
      .message { max-width: 90%; font-size: 0.9rem; }
      .input-area { padding: 0.8rem 1rem; flex-wrap: wrap; }
      .input-area input { width: 100%; }
      .input-area button { width: 100%; padding: 0.8rem; }
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <h2><span></span> Horizon AI</h2>
    <small>DeepSeek · آنلاین</small>
  </div>
  <div class="messages" id="messageBox">
    <div class="message ai">
      <span class="label">🤖 Horizon AI</span>
      سلام! من دستیار هوش مصنوعی هورایزن هستم. هر سوالی داری، بپرس.
    </div>
  </div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="سوال یا دستورت رو اینجا بنویس..." />
    <button id="sendBtn">ارسال</button>
  </div>
</div>

<script>
  // 🔑 کلید خودت رو اینجا بذار
  const DEEPSEEK_KEY = "sk-YourRealKeyHere"; 

  const messageBox = document.getElementById("messageBox");
  const userInput = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");

  function addMessage(text, sender) {
    const div = document.createElement("div");
    div.className = `message ${sender}`;
    if (sender === "ai") {
      div.innerHTML = `<span class="label">🤖 Horizon AI</span>${text}`;
    } else {
      div.textContent = text;
    }
    messageBox.appendChild(div);
    messageBox.scrollTop = messageBox.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing-indicator";
    div.id = "typingDots";
    div.innerHTML = "<span></span><span></span><span></span>";
    messageBox.appendChild(div);
    messageBox.scrollTop = messageBox.scrollHeight;
  }

  function hideTyping() {
    const dots = document.getElementById("typingDots");
    if (dots) dots.remove();
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    sendBtn.disabled = true;
    userInput.disabled = true;
    addMessage(text, "user");
    userInput.value = "";
    showTyping();

    try {
      const response = await fetch("https://api.deepseek.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${DEEPSEEK_KEY}`
        },
        body: JSON.stringify({
          model: "deepseek-chat",
          messages: [
            { role: "system", content: "تو یک دستیار فارسی‌زبان و حرفه‌ای هستی." },
            { role: "user", content: text }
          ],
          stream: false
        })
      });

      const data = await response.json();
      hideTyping();

      if (data.choices && data.choices[0]) {
        addMessage(data.choices[0].message.content, "ai");
      } else {
        addMessage("خطا: پاسخی دریافت نشد.", "ai");
      }
    } catch (error) {
      hideTyping();
      addMessage("خطا در ارتباط با سرور.", "ai");
      console.error(error);
    }

    sendBtn.disabled = false;
    userInput.disabled = false;
    userInput.focus();
  }

  sendBtn.addEventListener("click", sendMessage);
  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
