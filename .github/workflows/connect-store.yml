name: 🔗 Connect Store to Backend

on:
  workflow_dispatch:

jobs:
  connect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # ============================================================
      # ۱. دریافت فروشگاه
      # ============================================================
      - name: 📥 Checkout store
        uses: actions/checkout@v4
        with:
          repository: beaconchain-horizon/Beaconchain.us
          ref: mine
          path: store

      # ============================================================
      # ۲. دریافت هسته (برای بک‌اند)
      # ============================================================
      - name: 📥 Checkout core
        uses: actions/checkout@v4
        with:
          repository: beaconchain-horizon/horizon-core-engine
          ref: mine
          path: core

      # ============================================================
      # ۳. به‌روزرسانی فروشگاه
      # ============================================================
      - name: 🔗 Update store API URL
        run: |
          cd store
          # جایگزینی آدرس بک‌اند در فایل index.html
          sed -i 's|const API_BASE_URL = .*|const API_BASE_URL = "http://localhost:8080/api/v1";|g' index.html
          sed -i '/function buyProduct/,/}/c\
          async function buyProduct(name, price) {\
              if (!currentUser) { alert("لطفاً ابتدا وارد شوید."); openModal("login"); return; }\
              const confirmBuy = confirm(`آیا از خرید "${name}" به مبلغ $${price} اطمینان دارید؟`);\
              if (!confirmBuy) return;\
              try {\
                  const response = await fetch(API_BASE_URL + "/payments", {\
                      method: "POST",\
                      headers: { "Content-Type": "application/json" },\
                      body: JSON.stringify({ product: name, amount: price, userId: currentUser.id })\
                  });\
                  const data = await response.json();\
                  alert(`✅ خرید "${name}" با موفقیت ثبت شد.\\nشماره سفارش: ${data.orderId}\\nمبلغ $${price} باید به کیف پول زیر واریز شود:\\n${data.wallet}\\nپس از تأیید، API Key شما صادر می‌شود.`);\
              } catch (error) {\
                  alert("❌ خطا در اتصال به سرور. لطفاً دوباره تلاش کنید.");\
              }\
          }' index.html

      # ============================================================
      # ۴. کامیت و پوش تغییرات به فروشگاه
      # ============================================================
      - name: 📤 Commit and push changes
        run: |
          cd store
          git config user.name "Horizon Bot"
          git config user.email "bot@beaconchain.us"
          git add index.html
          git commit -m "feat: connect store to backend API" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/beaconchain-horizon/Beaconchain.us.git mine

      # ============================================================
      # ۵. ایجاد گزارش
      # ============================================================
      - name: 📝 Create summary issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '✅ Store connected to backend successfully!',
              body: `**Horizon Store is now connected to the backend!**\n\n## 🔗 What happened\n\n- Store updated to use backend API\n- Changes pushed to Beaconchain.us\n\n## 🧠 Next Steps\n\n1. Run the backend on your system:\n   \`\`\`bash\n   ./horizon-api\n   \`\`\`\n2. Store will now send real requests to the backend\n\n## 📌 Note\n\nMake sure to replace \`http://localhost:8080\` with your actual backend URL if running on a server.\n\n**Horizon is now fully operational!** 🚀`
            });
            console.log(`✅ Issue #${issue.data.number} created.`);
