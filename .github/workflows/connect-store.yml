name: 🔗 Connect Store to Backend

on:
  workflow_dispatch:

jobs:
  connect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout store
        uses: actions/checkout@v4
        with:
          repository: beaconchain-horizon/Beaconchain.us
          ref: mine
          path: store
          token: ${{ secrets.PAT_TOKEN }}

      - name: 🔗 Update API URL
        run: |
          cd store
          sed -i 's|const API_BASE_URL = .*|const API_BASE_URL = "http://localhost:8080/api/v1";|g' index.html

      - name: 📤 Push changes
        run: |
          cd store
          git config user.name "Horizon Bot"
          git config user.email "bot@beaconchain.us"
          git add index.html
          git commit -m "feat: connect store to backend" || echo "No changes"
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/beaconchain-horizon/Beaconchain.us.git mine || echo "Push done"
