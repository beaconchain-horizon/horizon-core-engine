name: Horizon Unified Deploy (Vercel-like)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # اجرای دستی

permissions:
  contents: write
  pages: write

jobs:
  deploy-all:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - name: Beaconchain.us
            path: Beaconchain.us
            build_cmd: 'echo "No build needed"'
            deploy_dir: './'
          - name: beaconcha.in
            path: beaconcha.in
            build_cmd: 'echo "No build needed"'
            deploy_dir: './'
          # می‌توانید مخازن دیگر را نیز اضافه کنید
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          repository: beaconchain-horizon/${{ matrix.repo.name }}
          token: ${{ secrets.PAT_TOKEN }}
          path: ${{ matrix.repo.path }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.repo.path }}/package-lock.json

      - name: Install dependencies
        run: |
          cd ${{ matrix.repo.path }}
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Build project
        run: |
          cd ${{ matrix.repo.path }}
          ${{ matrix.repo.build_cmd }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./${{ matrix.repo.path }}/${{ matrix.repo.deploy_dir }}
          destination_dir: ${{ matrix.repo.name }}
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy ${{ matrix.repo.name }} from ${{ github.sha }}'
