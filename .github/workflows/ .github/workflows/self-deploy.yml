name: 🚀 Horizon Self-Deploy (No External Services)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      # ============================================================
      # 1. Checkout core repository
      # ============================================================
      - name: 📥 Checkout core
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============================================================
      # 2. Setup Go and build backend
      # ============================================================
      - name: 🐍 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: 📦 Install dependencies
        run: go mod tidy

      - name: 🔨 Build backend binary
        run: |
          go build -o horizon-api ./cmd/main.go
          chmod +x horizon-api

      # ============================================================
      # 3. Copy binary to store repository
      # ============================================================
      - name: 📂 Copy binary to Beaconchain.us
        run: |
          git clone https://github.com/beaconchain-horizon/Beaconchain.us.git ../store
          cp horizon-api ../store/
          cd ../store
          cat > run-backend.sh << 'EOF'
          #!/bin/bash
          ./horizon-api
          EOF
          chmod +x run-backend.sh
          git config user.name "Horizon Bot"
          git config user.email "bot@beaconchain.us"
          git add horizon-api run-backend.sh
          git commit -m "chore: update backend binary" || echo "No changes to commit"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/beaconchain-horizon/Beaconchain.us.git mine || echo "Push failed"

      # ============================================================
      # 4. Upload binary as artifact (for manual download)
      # ============================================================
      - name: 📤 Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: horizon-api-binary
          path: horizon-api

      # ============================================================
      # 5. Create summary issue
      # ============================================================
      - name: 📝 Create summary issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '✅ Horizon Self-Deploy Complete',
              body: `**Horizon backend built and deployed successfully!**\n\n## 🔗 Access Points\n\n- **Frontend (Store):** https://beaconchain-horizon.github.io/Beaconchain.us/\n- **Backend Binary:** Download from Actions → Artifacts → \`horizon-api-binary\`\n\n## 🧠 How to Run Backend Locally\n\n1. Download \`horizon-api-binary\` artifact\n2. Extract and run:\n   \`\`\`bash\n   chmod +x horizon-api\n   ./horizon-api\n   \`\`\`\n3. API will be available at \`http://localhost:8080/api/v1/\`\n\n## ✅ This deployment uses:\n- Only GitHub resources (Actions, Pages, Artifacts)\n- No external services (Railway, Render, etc.)\n- Your own repositories\n\n**Horizon is now self-sufficient and independent.** 🚀`
            });
            console.log(`✅ Issue #${issue.data.number} created.`);
