name: Horizon AI - Ecosystem Brain

on:
  push:
    branches: [ mine ]
  workflow_dispatch:
    inputs:
      command:
        description: 'Command (e.g., convert go python main.go)'
        required: false
        default: 'status'

jobs:
  horizon-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout all repositories
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout other repos
        run: |
          mkdir -p ../Beaconchain.us ../hub
          git clone https://github.com/beaconchain-horizon/Beaconchain.us.git ../Beaconchain.us || true
          git clone https://github.com/beaconchain-horizon/hub.git ../hub || true

      - name: Install and start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "PATH=$PATH:$HOME/.ollama/bin" >> $GITHUB_ENV
          # Start the server in the background
          ollama serve &
          # Wait for the server to be ready
          sleep 5
          # Verify the server is running
          ollama list || (echo "Ollama server failed to start" && exit 1)

      - name: Pull AI model
        run: |
          ollama pull deepseek-coder:6.7b

      - name: Gather context
        id: context
        run: |
          echo "📂 Gathering project context..." > context.txt
          echo "## Horizon Project Context" >> context.txt
          echo "" >> context.txt
          echo "### horizon-core-engine (Go)" >> context.txt
          head -n 50 main.go 2>/dev/null >> context.txt || echo "main.go not found" >> context.txt
          echo "" >> context.txt
          echo "### Beaconchain.us (HTML/JS)" >> context.txt
          head -n 50 ../Beaconchain.us/index.html 2>/dev/null >> context.txt || echo "index.html not found" >> context.txt
          echo "" >> context.txt
          echo "### hub (HTML/JS)" >> context.txt
          head -n 50 ../hub/index.html 2>/dev/null >> context.txt || echo "index.html not found" >> context.txt

      - name: Process command
        id: process
        run: |
          COMMAND="${{ github.event.inputs.command }}"
          if [ -z "$COMMAND" ]; then
            COMMAND="status"
          fi
          echo "🧠 Executing command: $COMMAND"
          
          if [[ "$COMMAND" == "status" ]]; then
            echo "📊 Repository status:" > output.txt
            echo "- horizon-core-engine: $(git branch --show-current)" >> output.txt
            echo "- Beaconchain.us: $(cd ../Beaconchain.us && git branch --show-current 2>/dev/null || echo 'unknown')" >> output.txt
            echo "- hub: $(cd ../hub && git branch --show-current 2>/dev/null || echo 'unknown')" >> output.txt
          elif [[ "$COMMAND" == convert* ]]; then
            from=$(echo "$COMMAND" | awk '{print $2}')
            to=$(echo "$COMMAND" | awk '{print $3}')
            file=$(echo "$COMMAND" | awk '{print $4}')
            if [ -f "$file" ]; then
              echo "🔄 Converting code from $from to $to for file $file" > output.txt
              echo "Please convert the following code from $from to $to:" >> output.txt
              echo "" >> output.txt
              cat "$file" >> output.txt
              echo "" >> output.txt
              echo "Return the result with full explanations." >> output.txt
            else
              echo "❌ File $file not found" > output.txt
            fi
          else
            echo "❌ Unknown command: $COMMAND" > output.txt
            echo "Supported commands:" >> output.txt
            echo "  status" >> output.txt
            echo "  convert [from_lang] [to_lang] [file_path]" >> output.txt
          fi

      - name: Run AI Model (Clean Output)
        id: ai
        run: |
          CONTEXT=$(cat context.txt)
          QUERY=$(cat output.txt)
          FULL_PROMPT="You are a dedicated AI assistant for the Horizon ecosystem. Project context:\n$CONTEXT\n\nUser request:\n$QUERY"
          echo "$FULL_PROMPT" > full_prompt.txt
          # Run the model and strip ANSI escape codes (colors, animations, etc.)
          ollama run deepseek-coder:6.7b "$(cat full_prompt.txt)" 2>&1 | sed -r 's/\x1B\[[0-9;]*[mK]//g' > response.txt || echo "Error running the model" > response.txt

      - name: Create Issue or PR Comment
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = fs.readFileSync('response.txt', 'utf8');
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Horizon AI response to command: ${{ github.event.inputs.command }}`,
              body: `**Result:**\n\`\`\`\n${response}\n\`\`\``
            });
            console.log(`✅ Issue #${issue.data.number} created.`);

      - name: Commit changes (optional)
        if: github.event_name == 'push'
        run: |
          git config user.name "Horizon AI"
          git config.user.email "horizon-ai@beaconchain.us"
          git add .
          git commit -m "🤖 Horizon AI: auto-update" || echo "No changes to commit"
          git push origin mine || echo "Push failed"
